<head>
<meta charset="UTF-8">
<title>Shanghai MEP outfit planner</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background:#f1efe8; margin:0; padding:24px 16px 48px; color:#2c2c2a; }
  .wrap { max-width:780px; margin:0 auto; }
  h1 { font-size:21px; font-weight:600; margin:0 0 4px; }
  .sub { font-size:14px; color:#5f5e5a; margin:0 0 18px; }
  .legend { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:20px; }
  .legend span { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:#5f5e5a; }
  .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  .card { background:#ffffff; border-radius:14px; padding:18px 20px; margin-bottom:14px; border:1px solid #e5e3da; }
  .card.smart { border:2px solid #185fa5; }
  .card.travel { border:2px solid #888780; }
  .card-head { display:flex; align-items:baseline; flex-wrap:wrap; margin-bottom:14px; }
  .card-date { font-weight:600; font-size:16px; color:#2c2c2a; }
  .card-title { font-size:13px; color:#5f5e5a; margin-left:10px; }
  .tag { display:inline-flex; align-items:center; gap:5px; font-size:12px; color:#5f5e5a; margin-left:10px; }
  .items { display:flex; gap:16px; flex-wrap:wrap; }
  .item { text-align:center; flex:1; min-width:110px; }
  .item img { height:120px; width:auto; max-width:100%; object-fit:contain; border-radius:8px; border:1px solid #e5e3da; display:block; margin:0 auto; }
  .item-label { font-size:11px; color:#888780; margin:8px 0 0; }
  .item-value { font-size:12px; margin:2px 0 0; font-weight:500; min-height:32px; }
  .note { font-size:12px; color:#888780; margin:14px 0 0; line-height:1.5; border-top:1px solid #f1efe8; padding-top:10px; }
  .controls { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  button.ctrl { font-size:12px; font-weight:600; padding:7px 14px; border-radius:8px; border:none; cursor:pointer; transition:opacity 0.15s; font-family:inherit; }
  button.ctrl:hover { opacity:0.85; }
  button.ctrl:active { opacity:0.7; }
  .btn-swap { background:#1c2530; color:#fff; }
  .btn-reset { background:#eceae3; color:#5f5e5a; }
  .btn-reset:disabled { opacity:0.4; cursor:default; }
  .changed-badge { font-size:10px; background:#fdeee5; color:#b4470f; padding:2px 8px; border-radius:6px; margin-left:8px; }
  .merged-badge { font-size:10px; background:#eef1f5; color:#3b4a5c; padding:2px 8px; border-radius:6px; margin-left:8px; }
</style>

const HATS = [["Black Brixton snapback", "hat_black"], ["Off-white/navy Brixton snapback", "hat_offwhite"], ["No hat", null]];
const ORIGINAL_DAYS = [{"date": "2\u20133 Jul", "day": "Thu night \u2192 Fri", "title": "Outbound flight, then straight into arrival, Safety Drill, Welcome Lunch & Opening Ceremony", "tag": "travel", "top": "shirt_burgundy_geo", "bottom": "trousers_navy_linen", "shoe": "shoe_af1_white", "hat": null, "note": "One outfit covers both days. You land same-morning with almost no buffer before the Safety Drill (11:30) and Opening Ceremony (13:30) \u2014 realistically no time to change. The burgundy shirt and navy linen chinos travel well (linen blend resists creasing better than the smart trousers), stay cool on a 12-hour flight, and are smart enough to walk straight off the plane into the ceremony photos.", "merged": true}, {"date": "4 Jul", "day": "Sat", "title": "Lessons, Chinese games, Huangpu River Cruise (evening)", "tag": "outdoor", "top": "shirt_houndstooth", "bottom": "shorts_black_uniqlo", "shoe": "shoe_saucony_white", "hat": "hat_black", "note": "Smarten up slightly for the evening river cruise photos."}, {"date": "5 Jul", "day": "Sun", "title": "Lessons, Grand View Garden, Panlong Tiandi", "tag": "outdoor", "top": "shirt_blue_stripe", "bottom": "shorts_beige", "shoe": "shoe_saucony_white", "hat": "hat_offwhite", "note": "Long outdoor afternoon at the garden, then dinner and an evening visit \u2014 comfortable all day."}, {"date": "6 Jul", "day": "Mon", "title": "Hanfu experience, Nanjing Road & The Bund (evening)", "tag": "none", "top": "shirt_fine_pinstripe", "bottom": "shorts_black_uniqlo", "shoe": "shoe_saucony_white", "hat": null, "note": "Check whether Hanfu is provided for the cultural session \u2014 you likely won't need your own outfit for that part."}, {"date": "7 Jul", "day": "Tue", "title": "Local Chinese school visit, dinner out", "tag": "smart", "top": "shirt_burgundy_geo", "bottom": "trousers_navy_linen", "shoe": "shoe_af1_white", "hat": null, "note": "Representing MGSG to another school \u2014 navy linen chinos are smart but breathable for a full afternoon in the heat."}, {"date": "8 Jul", "day": "Wed", "title": "Craft workshops, Chinese painting (indoor)", "tag": "indoor", "top": "tee_iron_maiden_eddie", "bottom": "shorts_sage", "shoe": "shoe_saucony_white", "hat": null, "note": "Fully indoor, hands-on craft day \u2014 comfortable casual is fine."}, {"date": "9 Jul", "day": "Thu", "title": "Zhujiajiao Ancient Town, Shanghai Museum, Acrobatic Show", "tag": "outdoor", "top": "shirt_dark_diamond", "bottom": "shorts_grey_sport", "shoe": "shoe_saucony_navy", "hat": "hat_black", "note": "Long, hot, walking-heavy day on uneven stone streets \u2014 the navy/tan trainers hide dust better than white."}, {"date": "10 Jul", "day": "Fri", "title": "Bamboo weaving, songs, Tie-dye (indoor)", "tag": "indoor", "top": "tee_led_zeppelin", "bottom": "shorts_beige", "shoe": "shoe_saucony_white", "hat": null, "note": "Tie-dye workshop \u2014 wear something you don't mind risking a stray splash on."}, {"date": "11 Jul", "day": "Sat", "title": "UK Professionals meeting, closing rehearsal, Global Harbor shopping", "tag": "none", "top": "shirt_fine_pinstripe", "bottom": "trousers_stone_linen", "shoe": "shoe_af1_white", "hat": null, "note": "Meeting with UK professionals in the morning \u2014 stone linen chinos are a lighter alternative to heavier trousers."}, {"date": "12 Jul", "day": "Sun", "title": "Closing Ceremony, Oriental Pearl Tower, dinner out", "tag": "smart", "top": "shirt_houndstooth", "bottom": "trousers_black", "shoe": "shoe_af1_white", "hat": null, "note": "Closing Ceremony \u2014 your final and strongest smart-lift day."}, {"date": "13 Jul", "day": "Mon", "title": "Shanghai Zoo, packing, flight home", "tag": "outdoor", "top": "shirt_gnr_tee", "bottom": "shorts_grey_sport", "shoe": "shoe_saucony_navy", "hat": "hat_black", "note": "Hot zoo morning, then straight into packing and the flight home \u2014 comfort over presentation today."}];
const PLACEHOLDER_KEYS = new Set([]);
const TAG_META = {
  smart: ["#D85A30", "Smart-lift"],
  outdoor: ["#1D9E75", "Outdoor / heat"],
  indoor: ["#378ADD", "AC indoor"],
  travel: ["#888780", "Travel"],
  none: [null, null]
};

const state = ORIGINAL_DAYS.map(d => ({ top: d.top, bottom: d.bottom, shoe: d.shoe, hat: d.hat, changed: false }));

function findLabel(pool, key) {
  if (key === null) return "No hat";
  const hit = pool.find(p => p[1] === key);
  return hit ? hit[0] : key;
}

function imgHtml(key, label) {
  if (key === null) {
    return '<div style="height:120px; display:flex; align-items:center; justify-content:center; color:#b4b2a9; font-size:12px; border:1px dashed #e5e3da; border-radius:8px;">No hat</div>';
  }
  const cls = PLACEHOLDER_KEYS.has(key) ? 'placeholder' : '';
  return `<img class="${cls}" src="data:image/jpeg;base64,${IMAGES[key]}" alt="${label}">`;
}

function randomDifferent(pool, currentKey, excludeKeys) {
  const candidates = pool.filter(p => p[1] !== currentKey && !excludeKeys.has(p[1]));
  if (candidates.length === 0) {
    const fallback = pool.filter(p => p[1] !== currentKey);
    if (fallback.length === 0) return pool[0];
    return fallback[Math.floor(Math.random() * fallback.length)];
  }
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function swapDay(idx) {
  const s = state[idx];
  const usedTops = new Set(state.filter((_,i) => i !== idx).map(d => d.top));
  const usedBottoms = new Set(state.filter((_,i) => i !== idx).map(d => d.bottom));

  const newTop = randomDifferent(TOPS, s.top, usedTops);
  const newBottom = randomDifferent(BOTTOMS, s.bottom, usedBottoms);
  const newShoe = randomDifferent(SHOES, s.shoe, new Set());
  const newHat = randomDifferent(HATS, s.hat, new Set());

  s.top = newTop[1];
  s.bottom = newBottom[1];
  s.shoe = newShoe[1];
  s.hat = newHat[1] === undefined ? null : newHat[1];
  s.changed = true;
  render();
}

function resetDay(idx) {
  const orig = ORIGINAL_DAYS[idx];
  state[idx] = { top: orig.top, bottom: orig.bottom, shoe: orig.shoe, hat: orig.hat, changed: false };
  render();
}

function render() {
  const container = document.getElementById('days');
  container.innerHTML = '';
  ORIGINAL_DAYS.forEach((d, idx) => {
    const s = state[idx];
    const [color, label] = TAG_META[d.tag];
    const tagHtml = label ? `<span class="tag"><span class="dot" style="background:${color};"></span>${label}</span>` : '';
    const changedBadge = s.changed ? '<span class="changed-badge">Swapped</span>' : '';
    const mergedBadge = d.merged ? '<span class="merged-badge">Same outfit both days</span>' : '';
    let cardClass = 'card';
    if (d.tag === 'smart') cardClass += ' smart';
    if (d.tag === 'travel') cardClass += ' travel';

    const hatItem = (s.hat !== null || d.hat !== null) ? `
      <div class="item">
        ${imgHtml(s.hat, findLabel(HATS, s.hat))}
        <p class="item-label">Hat</p>
        <p class="item-value">${findLabel(HATS, s.hat)}</p>
      </div>` : '';

    const card = document.createElement('div');
    card.className = cardClass;
    card.innerHTML = `
      <div class="card-head">
        <span class="card-date">${d.date}, ${d.day}</span>
        <span class="card-title">${d.title}</span>
        ${tagHtml}
        ${mergedBadge}
        ${changedBadge}
      </div>
      <div class="items">
        <div class="item">
          ${imgHtml(s.top, findLabel(TOPS, s.top))}
          <p class="item-label">Top</p>
          <p class="item-value">${findLabel(TOPS, s.top)}</p>
        </div>
        <div class="item">
          ${imgHtml(s.bottom, findLabel(BOTTOMS, s.bottom))}
          <p class="item-label">Bottom</p>
          <p class="item-value">${findLabel(BOTTOMS, s.bottom)}</p>
        </div>
        <div class="item">
          ${imgHtml(s.shoe, findLabel(SHOES, s.shoe))}
          <p class="item-label">Shoes</p>
          <p class="item-value">${findLabel(SHOES, s.shoe)}</p>
        </div>
        ${hatItem}
      </div>
      <p class="note">${s.changed ? "Swapped to a fresh combination &mdash; tap Reset to go back to the original plan for this day." : d.note}</p>
      <div class="controls">
        <button class="ctrl btn-swap" data-action="swap" data-idx="${idx}">Swap for another outfit</button>
        <button class="ctrl btn-reset" data-action="reset" data-idx="${idx}" ${s.changed ? '' : 'disabled'}>Reset to original</button>
      </div>
    `;
    container.appendChild(card);
  });

  container.querySelectorAll('button[data-action="swap"]').forEach(btn => {
    btn.addEventListener('click', () => swapDay(parseInt(btn.dataset.idx)));
  });
  container.querySelectorAll('button[data-action="reset"]').forEach(btn => {
    btn.addEventListener('click', () => resetDay(parseInt(btn.dataset.idx)));
  });
}

render();
</script>
</body>
